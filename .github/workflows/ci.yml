name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install CLI dependencies
        working-directory: cli
        run: pip install -e ".[dev]"

      - name: Run linter (ruff)
        working-directory: backend
        run: python -m ruff check app/ tests/ --output-format github || true

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  cli-tests:
    name: CLI — Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install CLI dependencies
        working-directory: cli
        run: pip install -e ".[dev]"

      - name: Run CLI tests
        working-directory: cli
        run: python -m pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  demo-scan:
    name: Demo — Scan sample projects
    runs-on: ubuntu-latest
    needs: [backend-tests, cli-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e backend/.[dev]
          pip install -e cli/.[dev]

      - name: Scan python-vulnerable
        working-directory: cli
        run: |
          python -m scs_scanner.main scan ../sample-projects/python-vulnerable --format json --output ../reports/python-vulnerable.json
          python -m scs_scanner.main scan ../sample-projects/python-vulnerable --fail-on critical && echo "No critical found" || echo "Critical vulnerabilities detected (expected)"

      - name: Scan python-secure
        working-directory: cli
        run: |
          python -m scs_scanner.main scan ../sample-projects/python-secure --fail-on high

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: reports/
