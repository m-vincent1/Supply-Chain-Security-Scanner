version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scs-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./sample-projects:/sample-projects:ro
      - ./reports:/reports
    environment:
      - SCS_DATABASE_URL=sqlite:////app/data/scans.db
      - SCS_OFFLINE_MODE=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scs-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
